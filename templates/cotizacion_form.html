{% extends "base.html" %}
{% block title %}Nueva Cotización{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-file-earmark-text"></i> Nueva Cotización</h2>

<div class="card">
    <div class="card-body">
        <form method="POST" id="cotizacionForm">
            <h5 class="mb-3">Datos del Cliente</h5>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Cliente *</label>
                    <input type="text" name="cliente" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Contacto</label>
                    <input type="text" name="contacto" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Validez (días)</label>
                    <input type="number" name="validez" class="form-control" value="30">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Observaciones</label>
                <textarea name="observaciones" class="form-control" rows="2"></textarea>
            </div>
            
            <h5 class="mt-4 mb-3">Detalles de Cotización</h5>
            <div id="detalles">
                <div class="row mb-3 detalle-row">
                    <div class="col-md-5">
                        <select name="producto_id[]" class="form-select" required>
                            <option value="">Seleccionar producto...</option>
                            {% for p in productos %}
                            <option value="{{ p.id }}" data-precio="{{ p.precio_venta }}">{{ p.nombre }} - ${{ p.precio_venta }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="number" name="cantidad[]" class="form-control" placeholder="Cantidad" min="1" required>
                    </div>
                    <div class="col-md-3">
                        <input type="number" step="0.01" name="precio[]" class="form-control" placeholder="Precio" required>
                    </div>
                    <div class="col-md-1">
                        <button type="button" class="btn btn-danger" disabled><i class="bi bi-trash"></i></button>
                    </div>
                </div>
            </div>
            
            <button type="button" class="btn btn-outline-primary mb-4" onclick="agregarDetalle()"><i class="bi bi-plus-lg"></i> Agregar Producto</button>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Descuento ($)</label>
                    <input type="number" step="0.01" name="descuento" class="form-control" value="0">
                </div>
            </div>
            
            <div class="mb-3">
                <button type="submit" class="btn btn-primary">Crear Cotización</button>
                <a href="{{ url_for('cotizaciones') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
