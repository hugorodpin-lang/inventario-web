{% extends "base.html" %}
{% block title %}{% if sucursal %}Editar{% else %}Nueva{% endif %} Sucursal{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-shop"></i> {% if sucursal %}Editar{% else %}Nueva{% endif %} Sucursal</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nombre de la Sucursal *</label>
                    <input type="text" name="nombre" class="form-control" required value="{{ sucursal.nombre if sucursal else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control" value="{{ sucursal.telefono if sucursal else '' }}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label">Dirección</label>
                    <input type="text" name="direccion" class="form-control" value="{{ sucursal.direccion if sucursal else '' }}">
                </div>
            </div>
            {% if sucursal %}
            <div class="row">
                <div class="col-md-12 mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="activa" id="activa" {% if sucursal.activa %}checked{% endif %}>
                        <label class="form-check-label" for="activa">
                            Sucursal activa
                        </label>
                    </div>
                </div>
            </div>
            {% endif %}
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg"></i> {% if sucursal %}Actualizar{% else %}Crear{% endif %} Sucursal
            </button>
            <a href="{{ url_for('sucursales') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
