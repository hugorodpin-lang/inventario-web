{% extends "base.html" %}
{% block title %}Editar Cotización{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-file-earmark-text"></i> Editar Cotización #{{ cotizacion.id }}</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Cliente</label>
                    <input type="text" class="form-control" value="{{ cotizacion.cliente }}" disabled>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Total</label>
                    <input type="text" class="form-control" value="${{ cotizacion.total }}" disabled>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select name="estado" class="form-select">
                    <option value="pendiente" {% if cotizacion.estado == 'pendiente' %}selected{% endif %}>Pendiente</option>
                    <option value="aceptada" {% if cotizacion.estado == 'aceptada' %}selected{% endif %}>Aceptada</option>
                    <option value="rechazada" {% if cotizacion.estado == 'rechazada' %}selected{% endif %}>Rechazada</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Actualizar</button>
            <a href="{{ url_for('cotizaciones') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
