{% extends "base.html" %}
{% block title %}Nuevo Movimiento{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-arrow-left-right"></i> Nuevo Movimiento</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tipo de Movimiento *</label>
                    <select name="tipo" class="form-select" id="tipoMovimiento" required>
                        <option value="">Seleccionar...</option>
                        <option value="entrada">Entrada (Ingreso)</option>
                        <option value="salida">Salida (Egreso)</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Producto *</label>
                    <select name="producto_id" class="form-select" id="productoSelect" required>
                        <option value="">Seleccionar producto...</option>
                        {% for p in productos %}
                        <option value="{{ p.id }}" data-stock="{{ p.stock_actual }}">{{ p.nombre }} (Stock: {{ p.stock_actual }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Cantidad *</label>
                    <input type="number" name="cantidad" class="form-control" min="1" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Motivo</label>
                    <input type="text" name="motivo" class="form-control" placeholder="Ej: Ajuste de inventario">
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Registrar Movimiento</button>
            <a href="{{ url_for('movimientos') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>

<script>
document.getElementById('tipoMovimiento').addEventListener('change', function() {
    const cantidadInput = document.querySelector('input[name="cantidad"]');
    const productoSelect = document.getElementById('productoSelect');
    
    if (this.value === 'salida') {
        cantidadInput.max = productoSelect.options[productoSelect.selectedIndex]?.dataset.stock || 0;
    } else {
        cantidadInput.removeAttribute('max');
    }
});
</script>
{% endblock %}
