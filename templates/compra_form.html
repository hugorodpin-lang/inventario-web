{% extends "base.html" %}
{% block title %}Nueva Compra{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-cart-plus"></i> Nueva Compra</h2>

<div class="card">
    <div class="card-body">
        <form method="POST" id="compraForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Proveedor</label>
                    <input type="text" name="proveedor" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Número de Factura</label>
                    <input type="text" name="numero_factura" class="form-control">
                </div>
            </div>
            
            <h5 class="mt-4 mb-3">Detalles de Compra</h5>
            <div id="detalles">
                <div class="row mb-3 detalle-row">
                    <div class="col-md-5">
                        <select name="producto_id[]" class="form-select producto-select" required>
                            <option value="">Seleccionar producto...</option>
                            {% for p in productos %}
                            <option value="{{ p.id }}" data-precio="{{ p.precio_compra }}">{{ p.nombre }} (${{ p.precio_compra }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="number" name="cantidad[]" class="form-control" placeholder="Cantidad" min="1" required>
                    </div>
                    <div class="col-md-3">
                        <input type="number" step="0.01" name="precio[]" class="form-control" placeholder="Precio" required>
                    </div>
                    <div class="col-md-1">
                        <button type="button" class="btn btn-danger btn-remove" disabled><i class="bi bi-trash"></i></button>
                    </div>
                </div>
            </div>
            
            <button type="button" class="btn btn-outline-primary mb-4" onclick="agregarDetalle()"><i class="bi bi-plus-lg"></i> Agregar Producto</button>
            
            <div class="mb-3">
                <button type="submit" class="btn btn-primary">Registrar Compra</button>
                <a href="{{ url_for('compras') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
