{% extends "base.html" %}
{% block title %}Editar Compra{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-cart-plus"></i> Editar Compra #{{ compra.id }}</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Proveedor</label>
                    <input type="text" class="form-control" value="{{ compra.proveedor }}" disabled>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Total</label>
                    <input type="text" class="form-control" value="${{ compra.total }}" disabled>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select name="estado" class="form-select">
                    <option value="pendiente" {% if compra.estado == 'pendiente' %}selected{% endif %}>Pendiente</option>
                    <option value="pagada" {% if compra.estado == 'pagada' %}selected{% endif %}>Pagada</option>
                    <option value="cancelada" {% if compra.estado == 'cancelada' %}selected{% endif %}>Cancelada</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Actualizar</button>
            <a href="{{ url_for('compras') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
