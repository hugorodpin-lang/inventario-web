{% extends "base.html" %}
{% block title %}{% if usuario %}Editar{% else %}Nuevo{% endif %} Usuario{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-person-plus"></i> {% if usuario %}Editar{% else %}Nuevo{% endif %} Usuario</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Usuario *</label>
                    <input type="text" name="username" class="form-control" value="{{ usuario.username if usuario else '' }}" {% if usuario %}readonly{% endif %} required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nombre Completo</label>
                    <input type="text" name="nombre" class="form-control" value="{{ usuario.nombre if usuario else '' }}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">{% if usuario %}Nueva {% endif %}Contraseña{% if not usuario %} *{% endif %}</label>
                    <input type="password" name="password" class="form-control" {% if not usuario %}required{% endif %}>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Rol</label>
                    <select name="rol" class="form-select">
                        <option value="empleado" {% if usuario and usuario.rol == 'empleado' %}selected{% endif %}>Empleado</option>
                        <option value="admin" {% if usuario and usuario.rol == 'admin' %}selected{% endif %}>Administrador</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{{ url_for('usuarios') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
