{% extends "base.html" %}
{% block title %}Reportes - Inventario{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-graph-up"></i> Reportes</h2>

<div class="row">
    <div class="col-md-6 mb-4">
        <div class="card h-100">
            <div class="card-body text-center">
                <i class="bi bi-box-seam display-1 text-primary"></i>
                <h4 class="mt-3">Reporte de Inventario</h4>
                <p class="text-muted">Lista completa de productos con stock, precios y valores</p>
                <a href="{{ url_for('reporte_inventario') }}" class="btn btn-primary"><i class="bi bi-download"></i> Generar</a>
            </div>
        </div>
    </div>
    <div class="col-md-6 mb-4">
        <div class="card h-100">
            <div class="card-body text-center">
                <i class="bi bi-cart-check display-1 text-success"></i>
                <h4 class="mt-3">Reporte de Ventas</h4>
                <p class="text-muted">Historial de ventas por período</p>
                <a href="{{ url_for('reporte_ventas') }}" class="btn btn-success"><i class="bi bi-download"></i> Generar</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
